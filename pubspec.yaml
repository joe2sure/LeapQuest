name: leap_quest
description: "A minimalistic jumping game built with Flutter and Flame"


version: 1.0.0+1

environment:
  sdk: ^3.6.0


dependencies:
  flutter:
    sdk: flutter
  flame: ^1.8.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  audioplayers: ^5.0.0
  google_fonts: ^5.1.0


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:


  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/audio/player/game_over_sound/
    - assets/audio/player/jump_sound/
    - assets/audio/player/landing_sound/
    - assets/audio/player/power_up_sound/
    - assets/audio/background/chill_mode/
    - assets/audio/background/energetic_sound/
    - assets/audio/environment/ambient_bg_noise/
    - assets/audio/environment/wind_effect/
    - assets/audio/ui/button_click/
    - assets/audio/ui/start_game_sound/
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Game Over
      fonts:
        - asset: assets/fonts/game_over.ttf
    - family: Game glm
      fonts:
        - asset: assets/fonts/GAME_glm.ttf
    - family: Game Play
      fonts:
        - asset: assets/fonts/Gameplay.ttf
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
